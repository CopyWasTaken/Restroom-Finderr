<!DOCTYPE html>
<html>
<head>
<title>Restroom Finder</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
font-family:Arial;
margin:0;
text-align:center;
}

h2{
margin:10px;
}

#map{
height:80vh;
}

button{
padding:14px 22px;
font-size:16px;
background:#2e7d32;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
}

#status{
margin:8px;
font-size:14px;
color:#444;
}
</style>
</head>

<body>

<h2>🚻 Public Restroom Finder</h2>

<button onclick="startSearch()">Find Restrooms Near Me</button>

<div id="status">Tap the button to begin</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="javascript.js"></script>

</body>
</html>
